name: build-and-test

on:
  push:
    branches: ["main"]
    paths: ["backend/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore backend/Microwave.sln

      - name: Build
        run: dotnet build backend/Microwave.sln --no-restore

      - name: Test
        run: dotnet test backend/Microwave.sln --no-build --verbosity normal
