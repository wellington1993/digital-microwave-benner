name: Backend Tests

on:
  push:
    branches: ["main"]
    paths:
      - 'backend/**'
  pull_request:
    branches: ["main"]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore backend/Microwave.sln

      - name: Build
        run: dotnet build backend/Microwave.sln --no-restore -c Release

      - name: Test
        run: dotnet test backend/Microwave.sln --no-build -c Release --logger "console;verbosity=minimal"
