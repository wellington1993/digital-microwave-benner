name: build-and-deploy

on:
  push:
    branches: ["main"]
    paths: ["frontend/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: build
        run: |
          cd frontend
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'frontend/dist/'

      - uses: actions/deploy-pages@v4
